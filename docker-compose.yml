version: '3.8'

services:
  app:
    build: .
    container_name: lms_cameroun_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-lms_cameroun}
      - DB_USER=${DB_USER:-lms_user}
      - DB_PASS=${DB_PASS:-lms_password}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8080}
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: lms_cameroun_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-lms_cameroun}
      POSTGRES_USER: ${DB_USER:-lms_user}
      POSTGRES_PASSWORD: ${DB_PASS:-lms_password}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lms_user} -d ${DB_NAME:-lms_cameroun}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: lms_cameroun_admin
    ports:
      - "8081:8080"
    depends_on:
      - db
    profiles:
      - dev

volumes:
  pg_data:
